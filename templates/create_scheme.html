{% extends "base.html" %}

{% block title %}Підсумок - Vynorob{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Підсумок</h1>
        <p class="subtitle">Перегляньте параметри вашої технологічної схеми</p>
        
        <div id="schemePreview" class="scheme-preview">
            <!-- Will be populated by JavaScript -->
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 40px; gap: 15px;">
            <button class="btn" onclick="window.location.href='/style-tech'" style="background: #e0e0e0; color: #666;">
                ← Назад
            </button>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-secondary" onclick="exportToPDF()">
                    📄 Зберегти в PDF
                </button>
                <button class="btn btn-primary" onclick="createScheme()">
                    Створити схему
                </button>
            </div>
        </div>
    </div>
</div>

<script>
async function loadSchemePreview() {
    const response = await fetch('/api/get-session');
    const data = await response.json();
    
    const preview = document.getElementById('schemePreview');
    
    let html = '<div class="scheme-data">';
    
    // Блок 1: Сировина і схема бродіння
    if (data.color_params) {
        const cp = data.color_params;
        const styleLabel = cp.expected_style || data.color || '';
        if (styleLabel) {
            html += `<div class="scheme-item"><strong>Сировина і колір:</strong> ${styleLabel}</div>`;
        }
        if (cp.fermentation_scheme) {
            const fsMap = {
                white: 'Біла',
                red: 'Червона',
                rose: 'Рожева',
                orange: 'Orange',
                blanc_de_noirs: 'Blanc de noirs'
            };
            const fsLabel = fsMap[cp.fermentation_scheme] || cp.fermentation_scheme;
            html += `<div class="scheme-item"><strong>Схема бродіння:</strong> ${fsLabel}</div>`;
        }
    } else if (data.color) {
        html += `<div class="scheme-item"><strong>Колір:</strong> ${data.color}</div>`;
    }
    
    // Блок 2: Стиль по солодкості та спирту
    if (data.style_params) {
        const sp = data.style_params;
        const sweetMap = {
            suhe: 'Сухе',
            napivsuhe: 'Напівсухе',
            napivsolodke: 'Напівсолодке',
            desert: 'Десертне'
        };
        const abvMap = {
            low: '9–11%',
            mid: '11–13%',
            high: '13–15%',
            very_high: '15–17%'
        };
        const sweet = sweetMap[sp.sweetnessCategory] || sp.style || data.style || '';
        const abv = abvMap[sp.alcoholCategory] || '';
        if (sweet || abv) {
            html += '<div class="scheme-section"><h3>Стиль по солодкості та спирту:</h3>';
            if (sweet) html += `<div class="scheme-item"><strong>Солодкість:</strong> ${sweet}</div>`;
            if (abv) html += `<div class="scheme-item"><strong>Цільова спиртуозність:</strong> ${abv}</div>`;
            if (sp.S0 != null) html += `<div class="scheme-item">Початковий цукор сусла S₀: ${sp.S0} г/дм³</div>`;
            if (sp.RS != null) html += `<div class="scheme-item">Залишковий цукор RS: ${sp.RS} г/дм³</div>`;
            html += '</div>';
        }
    }
    
    // Блок 3: Стиль за CO2
    if (data.style_co2) {
        const sc = data.style_co2;
        const co2Label = typeof sc === 'object' && sc.CO2_label ? sc.CO2_label : sc;
        if (co2Label) {
            html += '<div class="scheme-section"><h3>Стиль за CO₂:</h3>';
            html += `<div class="scheme-item"><strong>Рівень CO₂:</strong> ${co2Label}</div>`;
            if (typeof sc === 'object') {
                if (sc.pressure_target != null) {
                    html += `<div class="scheme-item">Цільовий тиск: ${sc.pressure_target} бар (20°C)</div>`;
                }
                if (sc.method_CO2_label) {
                    html += `<div class="scheme-item">Метод отримання CO₂: ${sc.method_CO2_label}</div>`;
                }
                if (sc.packaging_label) {
                    html += `<div class="scheme-item">Тара: ${sc.packaging_label}</div>`;
                }
                if (sc.sugar_for_secondary != null) {
                    html += `<div class="scheme-item">Додатковий цукор на вторинне бродіння: ${sc.sugar_for_secondary} г/дм³</div>`;
                }
            }
            html += '</div>';
        }
    }
    
    // Блок 4: Кислотність сировини (TA)
    if (data.raw_material) {
        const rm = data.raw_material;
        html += '<div class="scheme-section"><h3>Кислотність сировини (TA):</h3>';
        if (rm.TA_now != null) html += `<div class="scheme-item">Поточна TA: ${rm.TA_now} г/дм³ (винна кислота)</div>`;
        if (rm.TA_target != null) html += `<div class="scheme-item">Цільова TA: ${rm.TA_target} г/дм³</div>`;
        if (rm.reference_norm) html += `<div class="scheme-item">Референс-норма: ${rm.reference_norm}</div>`;
        if (rm.correction_mode) html += `<div class="scheme-item">Режим корекції: ${rm.correction_mode}</div>`;
        if (rm.delta_TA != null && rm.delta_TA !== 0) {
            html += `<div class="scheme-item">План корекції ΔTA: ${rm.delta_TA.toFixed ? rm.delta_TA.toFixed(1) : rm.delta_TA} г/дм³</div>`;
        }
        html += '</div>';
    }
    
    // Блок 5: Бажаний смаковий стиль
    if (data.style_sensory) {
        const s = data.style_sensory;
        html += '<div class="scheme-section"><h3>Бажаний смаковий стиль:</h3>';
        html += `<div class="scheme-item">Сприйняття кислотності: ${s.perceivedAcidity ?? 50}/100</div>`;
        html += `<div class="scheme-item">Алкогольне тепло: ${s.alcoholWarmth ?? 50}/100</div>`;
        html += `<div class="scheme-item">Тіло: ${s.body ?? 50}/100, танінність: ${s.tannins ?? 40}/100, гіркота: ${s.bitterness ?? 30}/100</div>`;
        html += `<div class="scheme-item">Ароматична інтенсивність: ${s.aromaIntensity ?? 60}/100, фруктовість: ${s.fruitiness ?? 60}/100</div>`;
        html += `<div class="scheme-item">Тропічні/тіолові: ${s.tropical ?? 40}/100, квіткові/терпенові: ${s.floral ?? 40}/100, пряні/вторинні: ${s.spice ?? 40}/100</div>`;
        html += `<div class="scheme-item">Дубовість: ${s.oak ?? 40}/100, стиль кисню: ${s.oxidation ?? 40}/100, MLF: ${s.malolactic ?? 50}/100, кремовість: ${s.creaminess ?? 50}/100</div>`;
        html += '</div>';
    }
    
    // Блок 6: Технічні параметри та стабільність
    if (data.style_tech) {
        const t = data.style_tech;
        html += '<div class="scheme-section"><h3>Технічні параметри та стабільність:</h3>';
        if (t.pH != null) html += `<div class="scheme-item">pH: ${t.pH}</div>`;
        if (t.yanLevel) html += `<div class="scheme-item">YAN / живлення дріжджів: ${t.yanLevel}</div>`;
        html += `<div class="scheme-item">SO₂-режим: ${t.so2Protection ?? 50}/100</div>`;
        html += `<div class="scheme-item">Білкова стабілізація: ${t.proteinStab ?? 50}/100, тартратна: ${t.tartrateStab ?? 50}/100, фільтрація: ${t.filtrationLevel ?? 50}/100</div>`;
        html += `<div class="scheme-item">Температура бродіння: ${t.fermentationTemp ?? 40}/100, живлення дріжджів: ${t.yeastNutrition ?? 50}/100</div>`;
        html += `<div class="scheme-item">Контакт з осадом: ${t.leesContact ?? 50}/100, батонаж: ${t.batonnage ?? 40}/100</div>`;
        html += `<div class="scheme-item">Мікробіологічний ризик: ${t.microRisk ?? 40}/100, ризик леткої: ${t.vaRisk ?? 40}/100</div>`;
        html += '</div>';
    }
    
    // Автоматично розраховані кондиції вина (якщо є)
    if (data.wine_conditions) {
        html += '<div class="scheme-section">';
        html += '<h3>Орієнтовні кондиції готового вина:';
        if (data.color === 'Біле') {
            html += ' <span style="font-size: 0.8em; font-style: italic; color: #667eea;">(розраховано автоматично)</span>';
        }
        html += '</h3>';
        html += `<div class="scheme-item">Масова концентрація цукру: ${data.wine_conditions.sugar} г/дм³</div>`;
        html += `<div class="scheme-item">Масова концентрація кислоти: ${data.wine_conditions.acidity} г/дм³</div>`;
        html += `<div class="scheme-item">Масова концентрація спирту: ${data.wine_conditions.alcohol}% об.</div>`;
        html += '</div>';
    }
    
    if (data.scheme_type) {
        html += `<div class="scheme-item"><strong>Тип схеми:</strong> ${data.scheme_type}</div>`;
    }
    
    html += '</div>';
    preview.innerHTML = html;
}

async function createScheme() {
    const response = await fetch('/api/save-wine', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            create_next: true
        })
    });
    
    const result = await response.json();
    
    if (result.success) {
        // Navigate to technology scheme drawing page
        window.location.href = '/technology-scheme';
    } else {
        alert('Помилка при збереженні схеми');
    }
}

async function exportToPDF() {
    try {
        // Get the preview content
        const preview = document.getElementById('schemePreview');
        
        // For now, use browser's print functionality
        // Create a print-friendly version
        const printWindow = window.open('', '_blank');
        const sessionData = await fetch('/api/get-session').then(r => r.json());
        
        printWindow.document.write(`
            <html>
            <head>
                <title>Підсумок технологічної схеми - Vynorob</title>
                <style>
                    body {
                        font-family: Arial, sans-serif;
                        padding: 40px;
                        max-width: 800px;
                        margin: 0 auto;
                    }
                    h1 {
                        color: #722f3e;
                        border-bottom: 3px solid #d4af6e;
                        padding-bottom: 10px;
                    }
                    .scheme-section {
                        margin: 20px 0;
                        padding: 15px;
                        background: #f9f9f9;
                        border-left: 4px solid #722f3e;
                    }
                    .scheme-item {
                        margin: 10px 0;
                        padding: 8px 0;
                    }
                    h3 {
                        color: #4a1228;
                        margin-top: 0;
                    }
                    strong {
                        color: #722f3e;
                    }
                </style>
            </head>
            <body>
                <h1>🍷 Підсумок технологічної схеми</h1>
                ${preview.innerHTML}
                <p style="margin-top: 40px; color: #999; font-size: 12px;">
                    Створено: ${new Date().toLocaleDateString('uk-UA')} ${new Date().toLocaleTimeString('uk-UA')}
                </p>
            </body>
            </html>
        `);
        
        printWindow.document.close();
        
        // Wait a bit for content to load, then trigger print dialog
        setTimeout(() => {
            printWindow.print();
        }, 250);
        
    } catch (error) {
        console.error('Error exporting to PDF:', error);
        alert('Помилка при експорті в PDF');
    }
}

// Load preview on page load
loadSchemePreview();
</script>
{% endblock %}
