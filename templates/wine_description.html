{% extends "base.html" %}

{% block title %}Опис вина - Vynorob{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Опис вина</h1>
        <p class="subtitle">Виберіть характеристики вина</p>
        
        <form id="wineDescriptionForm" class="form">
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="characteristics" value="повнотіле">
                    <span>повнотіле</span>
                </label>
                
                <label class="checkbox-label">
                    <input type="checkbox" name="characteristics" value="легке">
                    <span>легке</span>
                </label>
                
                <label class="checkbox-label">
                    <input type="checkbox" name="characteristics" value="танінне">
                    <span>танінне</span>
                </label>
                
                <label class="checkbox-label">
                    <input type="checkbox" name="characteristics" value="фруктове">
                    <span>фруктове</span>
                </label>
                
                <label class="checkbox-label">
                    <input type="checkbox" name="characteristics" value="квіткове">
                    <span>квіткове</span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary">Далі</button>
        </form>
    </div>
</div>

<script>
document.getElementById('wineDescriptionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const checkboxes = document.querySelectorAll('input[name="characteristics"]:checked');
    const characteristics = Array.from(checkboxes).map(cb => cb.value);
    
    await saveChoice('wine_description', characteristics);
    window.location.href = '/summary';
});
</script>
{% endblock %}
