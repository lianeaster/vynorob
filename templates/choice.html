{% extends "base.html" %}

{% block title %}Вибір - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .btn-choice:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #f0f0f0;
        color: #999;
        border-color: #ddd;
    }
    .btn-choice:disabled:hover {
        transform: none;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <div style="text-align: center; margin-bottom: 15px;">
            <span style="font-size: 12px; color: #999; font-weight: 500;">Крок 6 з 7</span>
        </div>
        <h1 class="title">Оберіть наступний крок</h1>
        <p class="subtitle">Ви хочете додати опис вина чи вибрати схему виробництва?</p>
        
        <div class="button-group">
            <button class="btn btn-choice" id="choice-description" onclick="selectChoice('description')" disabled>Опис вина</button>
            <button class="btn btn-choice" id="choice-scheme" onclick="selectChoice('scheme')">Схема</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 40px; gap: 15px;">
            <button class="btn" onclick="window.location.href='/raw-material'" style="background: #e0e0e0; color: #666;">
                ← Назад
            </button>
            <button class="btn btn-primary" id="nextBtn" onclick="goNext()" disabled style="opacity: 0.5;">
                Далі →
            </button>
        </div>
    </div>
</div>

<script>
let selectedPath = null;

async function selectChoice(path) {
    selectedPath = path;
    
    // Update button states
    document.querySelectorAll('.btn-choice').forEach(btn => {
        if (!btn.disabled) {
            btn.style.opacity = '0.6';
            btn.style.transform = 'scale(1)';
        }
    });
    
    const selectedBtn = document.getElementById('choice-' + path);
    if (selectedBtn) {
        selectedBtn.style.opacity = '1';
        selectedBtn.style.transform = 'scale(1.05)';
        selectedBtn.style.boxShadow = '0 8px 16px rgba(114, 47, 62, 0.3)';
    }
    
    // Enable next button
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').style.opacity = '1';
}

async function goNext() {
    if (!selectedPath) {
        alert('Будь ласка, оберіть наступний крок');
        return;
    }
    
    await saveChoice('choice_path', selectedPath);
    
    if (selectedPath === 'description') {
        window.location.href = '/wine-description';
    } else if (selectedPath === 'scheme') {
        window.location.href = '/scheme-type';
    }
}

// Load previous choice if exists
window.addEventListener('DOMContentLoaded', async function() {
    const sessionData = await getSessionData();
    if (sessionData.choice_path) {
        selectChoice(sessionData.choice_path);
    }
});
</script>
{% endblock %}
