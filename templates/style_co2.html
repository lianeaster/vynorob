{% extends "base.html" %}

{% block title %}Стиль за CO2 - Винороб{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Стиль за CO2</h1>
        <p class="subtitle">Виберіть стиль вина за вмістом CO2</p>
        
        <div class="button-group">
            <button class="btn btn-choice" onclick="selectChoice('style_co2', 'Тихе')">Тихе</button>
            <button class="btn btn-choice" onclick="selectChoice('style_co2', 'Ігристе')">Ігристе</button>
        </div>
    </div>
</div>

<script>
async function selectChoice(step, choice) {
    await saveChoice(step, choice);
    window.location.href = '/raw-material';
}
</script>
{% endblock %}
