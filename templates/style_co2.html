{% extends "base.html" %}

{% block title %}Стиль за CO2 - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .btn-choice:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #f0f0f0;
        color: #999;
        border-color: #ddd;
    }
    .btn-choice:disabled:hover {
        transform: none;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Стиль за CO2</h1>
        <p class="subtitle">Виберіть стиль вина за вмістом CO2</p>
        
        <div class="button-group">
            <button class="btn btn-choice" onclick="selectChoice('style_co2', 'Тихе')">Тихе</button>
            <button class="btn btn-choice" onclick="selectChoice('style_co2', 'Ігристе')" disabled>Ігристе</button>
        </div>
    </div>
</div>

<script>
async function selectChoice(step, choice) {
    await saveChoice(step, choice);
    window.location.href = '/raw-material';
}
</script>
{% endblock %}
