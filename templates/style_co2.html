{% extends "base.html" %}

{% block title %}Стиль за CO2 - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .btn-choice:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #f0f0f0;
        color: #999;
        border-color: #ddd;
    }
    .btn-choice:disabled:hover {
        transform: none;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <div style="text-align: center; margin-bottom: 15px;">
            <span style="font-size: 12px; color: #999; font-weight: 500;">Крок 3 з 7</span>
        </div>
        <h1 class="title">Стиль за CO2</h1>
        <p class="subtitle">Виберіть стиль вина за вмістом CO2</p>
        
        <div class="button-group">
            <button class="btn btn-choice" id="choice-Тихе" onclick="selectStyleCO2('Тихе')">Тихе</button>
            <button class="btn btn-choice" id="choice-Ігристе" onclick="selectStyleCO2('Ігристе')" disabled>Ігристе</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 40px; gap: 15px;">
            <button class="btn" onclick="window.location.href='/style'" style="background: #e0e0e0; color: #666;">
                ← Назад
            </button>
            <button class="btn btn-primary" id="nextBtn" onclick="goNext()" disabled style="opacity: 0.5;">
                Далі →
            </button>
        </div>
    </div>
</div>

<script>
let selectedStyleCO2 = null;

async function selectStyleCO2(styleCO2) {
    selectedStyleCO2 = styleCO2;
    
    // Update button states
    document.querySelectorAll('.btn-choice').forEach(btn => {
        if (!btn.disabled) {
            btn.style.opacity = '0.6';
            btn.style.transform = 'scale(1)';
        }
    });
    
    const selectedBtn = document.getElementById('choice-' + styleCO2);
    if (selectedBtn) {
        selectedBtn.style.opacity = '1';
        selectedBtn.style.transform = 'scale(1.05)';
        selectedBtn.style.boxShadow = '0 8px 16px rgba(114, 47, 62, 0.3)';
    }
    
    // Enable next button
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').style.opacity = '1';
}

async function goNext() {
    if (!selectedStyleCO2) {
        alert('Будь ласка, оберіть стиль за CO2');
        return;
    }
    
    await saveChoice('style_co2', selectedStyleCO2);
    window.location.href = '/raw-material';
}

// Load previous choice if exists
window.addEventListener('DOMContentLoaded', async function() {
    const sessionData = await getSessionData();
    if (sessionData.style_co2) {
        selectStyleCO2(sessionData.style_co2);
    }
});
</script>
{% endblock %}
