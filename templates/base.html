<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vynorob - Система створення технологічних схем{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, rgba(42, 14, 28, 0.97) 0%, rgba(74, 18, 40, 0.97) 50%, rgba(42, 14, 28, 0.97) 100%);
            padding: 5px 20px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3), 0 1px 0 rgba(212, 175, 110, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logo-container:hover {
            transform: translateY(-2px);
        }
        
        .logo-icon {
            font-size: 28px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af6e 0%, #f0d89c 50%, #d4af6e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: 2px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #d4af6e;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #e8ddd0;
        }
        
        .auth-button {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #d4af6e 0%, #c49b5a 100%);
            color: #2a0e1c;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 110, 0.4);
        }
        
        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            color: #d4af6e;
            border: 1px solid rgba(212, 175, 110, 0.3);
        }
        
        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* User Dropdown Menu */
        .user-dropdown {
            position: relative;
        }
        
        .user-menu-button {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .user-menu-button:hover {
            background: rgba(212, 175, 110, 0.1);
        }
        
        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 8px;
        }
        
        .menu-icon span {
            display: block;
            width: 20px;
            height: 2px;
            background: #d4af6e;
            border-radius: 2px;
            transition: all 0.3s;
        }
        
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: rgba(42, 14, 28, 0.98);
            border: 1px solid rgba(212, 175, 110, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1001;
        }
        
        .user-dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-menu-item {
            padding: 12px 16px;
            color: #e8ddd0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            font-size: 14px;
            border-bottom: 1px solid rgba(212, 175, 110, 0.1);
        }
        
        .dropdown-menu-item:last-child {
            border-bottom: none;
        }
        
        .dropdown-menu-item:hover {
            background: rgba(212, 175, 110, 0.15);
        }
        
        .dropdown-menu-item:first-child {
            border-radius: 12px 12px 0 0;
        }
        
        .dropdown-menu-item:last-child {
            border-radius: 0 0 12px 12px;
        }
        
        .dropdown-menu-icon {
            font-size: 16px;
        }
        
        body.has-topbar {
            padding-top: 80px;
        }
        
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="{% if session.get('user') %}has-topbar{% endif %}">
    {% if session.get('user') %}
    <div class="top-bar">
        <div class="logo-container" onclick="window.location.href='/'">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Vynorob" style="height: 40px; width: auto;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div style="display: none; align-items: center; gap: 10px;">
                <span class="logo-icon">🍷</span>
                <span class="logo-text">Vynorob</span>
            </div>
        </div>
        
        <div class="user-menu">
            <div class="user-dropdown" id="userDropdown">
                <div class="user-menu-button" onclick="toggleUserMenu()">
                    <div class="menu-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" style="background: linear-gradient(135deg, #d4af6e 0%, #c49b5a 100%); display: flex; align-items: center; justify-content: center; color: #2a0e1c; font-size: 16px; font-weight: bold;">
                            {{ session['user']['name'][0].upper() }}
                        </div>
                        <span class="user-name">{{ session['user']['name'] }}</span>
                    </div>
                </div>
                
                <div class="dropdown-menu">
                    <a href="{{ url_for('auth.user_settings') }}" class="dropdown-menu-item">
                        <span class="dropdown-menu-icon">⚙️</span>
                        <span>Налаштування</span>
                    </a>
                    <a href="{{ url_for('auth.logout') }}" class="dropdown-menu-item">
                        <span class="dropdown-menu-icon">🚪</span>
                        <span>Вийти</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endif %}
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // User dropdown menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('active');
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown && !dropdown.contains(event.target)) {
                dropdown.classList.remove('active');
            }
        });
        
        // Global fetch wrapper to handle session expiration
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            return originalFetch.apply(this, args)
                .then(response => {
                    // Check if response is JSON and has session_expired flag
                    if (response.status === 401) {
                        return response.json().then(data => {
                            if (data.session_expired && data.redirect) {
                                // Session expired - redirect to login
                                window.location.href = data.redirect;
                                return Promise.reject(new Error('Session expired'));
                            }
                            return Promise.reject(data);
                        });
                    }
                    return response;
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    throw error;
                });
        };
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
