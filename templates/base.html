<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vynorob - Система створення технологічних схем{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, rgba(42, 14, 28, 0.97) 0%, rgba(74, 18, 40, 0.97) 50%, rgba(42, 14, 28, 0.97) 100%);
            padding: 15px 20px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3), 0 1px 0 rgba(212, 175, 110, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logo-container:hover {
            transform: translateY(-2px);
        }
        
        .logo-icon {
            font-size: 28px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af6e 0%, #f0d89c 50%, #d4af6e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: 2px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #d4af6e;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #e8ddd0;
        }
        
        .auth-button {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #d4af6e 0%, #c49b5a 100%);
            color: #2a0e1c;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 110, 0.4);
        }
        
        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            color: #d4af6e;
            border: 1px solid rgba(212, 175, 110, 0.3);
        }
        
        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        body.has-topbar {
            padding-top: 80px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="{% if session.get('user') %}has-topbar{% endif %}">
    {% if session.get('user') %}
    <div class="top-bar">
        <div class="logo-container" onclick="window.location.href='/'">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Vynorob" style="height: 40px; width: auto;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div style="display: none; align-items: center; gap: 10px;">
                <span class="logo-icon">🍷</span>
                <span class="logo-text">Vynorob</span>
            </div>
        </div>
        
        <div class="user-menu">
            <div class="user-info">
                <div class="user-avatar" style="background: linear-gradient(135deg, #d4af6e 0%, #c49b5a 100%); display: flex; align-items: center; justify-content: center; color: #2a0e1c; font-size: 16px; font-weight: bold;">
                    {{ session['user']['name'][0].upper() }}
                </div>
                <span class="user-name">{{ session['user']['name'] }}</span>
            </div>
            <a href="{{ url_for('auth.logout') }}" class="auth-button btn-logout">Вийти</a>
        </div>
    </div>
    {% endif %}
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
