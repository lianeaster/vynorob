{% extends "base.html" %}

{% block title %}Колір вина - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .btn-choice:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #f0f0f0;
        color: #999;
        border-color: #ddd;
    }
    .btn-choice:disabled:hover {
        transform: none;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Колір</h1>
        <p class="subtitle">Виберіть колір вина</p>
        
        <div class="button-group">
            <button class="btn btn-choice" onclick="selectChoice('color', 'Біле')">Біле</button>
            <button class="btn btn-choice" onclick="selectChoice('color', 'Червоне')" disabled>Червоне</button>
            <button class="btn btn-choice" onclick="selectChoice('color', 'Рожеве')" disabled>Рожеве</button>
        </div>
    </div>
</div>

<script>
async function selectChoice(step, choice) {
    await saveChoice(step, choice);
    window.location.href = '/style';
}
</script>
{% endblock %}
