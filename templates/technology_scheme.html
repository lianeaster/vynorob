{% extends "base.html" %}

{% block title %}Принципова технологічна схема - Vynorob{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
        max-width: 1200px;
    }
    
    .scheme-canvas-container {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        min-height: auto;
    }
    
    #schemeCanvas {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid #ddd;
    }
    
    .scheme-title {
        color: #000;
        text-align: center;
        font-size: 2rem;
        margin-bottom: 30px;
        font-family: Arial, sans-serif;
    }
    
    .controls {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 30px;
        flex-wrap: wrap;
    }
    
    .btn {
        padding: 15px 30px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .btn-secondary {
        background: #6c757d;
        color: white;
        box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
    }
    
    .btn-secondary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(108, 117, 125, 0.6);
        background: #5a6268;
    }
</style>
{% endblock %}

{% block content %}
<div class="scheme-canvas-container">
    <h1 class="scheme-title">Принципова технологічна схема</h1>
    <canvas id="schemeCanvas"></canvas>
    
    <div class="controls">
        <button class="btn btn-secondary" onclick="window.location.href='/'">На головну</button>
        <button class="btn btn-primary" onclick="downloadSchemePNG()">
            📥 Завантажити PNG
        </button>
        <button class="btn btn-primary" onclick="downloadSchemePDF()">
            📄 Завантажити PDF
        </button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Force reload with timestamp
const timestamp = new Date().getTime();
const script = document.createElement('script');
script.src = "{{ url_for('static', filename='js/scheme_renderer.js') }}?t=" + timestamp;
document.head.appendChild(script);

const canvas = document.getElementById('schemeCanvas');
let renderer = null;

script.onload = function() {
    loadWineData();
};

async function loadWineData() {
    const response = await fetch('/api/get-session');
    const wineData = await response.json();
    
    // Initialize renderer with canvas and wine data
    renderer = new SchemeRenderer(canvas, wineData);
    renderer.drawScheme();
}

// Functions for download buttons
function downloadSchemePNG() {
    if (renderer) {
        renderer.downloadPNG();
    }
}

function downloadSchemePDF() {
    if (renderer) {
        renderer.downloadPDF();
    }
}

// Add version for debugging  
const version = '26.0-all-white-backgrounds-final-' + Date.now();
console.log('Technology Scheme Version:', version);
</script>
{% endblock %}
