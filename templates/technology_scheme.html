{% extends "base.html" %}

{% block title %}Принципова технологічна схема - Vynorob{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
        max-width: 1200px;
    }
    
    .scheme-canvas-container {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        min-height: auto;
    }
    
    #schemeCanvas {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid #ddd;
    }
    
    .scheme-title {
        color: #000;
        text-align: center;
        font-size: 2rem;
        margin-bottom: 30px;
        font-family: Arial, sans-serif;
    }
    
    .controls {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 30px;
        flex-wrap: wrap;
    }
    
    .btn {
        padding: 15px 30px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .btn-secondary {
        background: #6c757d;
        color: white;
        box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
    }
    
    .btn-secondary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(108, 117, 125, 0.6);
        background: #5a6268;
    }
</style>
{% endblock %}

{% block content %}
<div class="scheme-canvas-container">
    <h1 class="scheme-title">Принципова технологічна схема</h1>
    <canvas id="schemeCanvas"></canvas>
    
    <div class="controls">
        <button class="btn btn-secondary" onclick="window.location.href='/'">На головну</button>
        <button class="btn btn-primary" onclick="downloadSchemePNG()">
            📥 Завантажити PNG
        </button>
        <button class="btn btn-primary" onclick="downloadSchemePDF()">
            📄 Завантажити PDF
        </button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const canvas = document.getElementById('schemeCanvas');
const ctx = canvas.getContext('2d');

// Get session data
let wineData = {};

async function loadWineData() {
    const response = await fetch('/api/get-session');
    wineData = await response.json();
    drawScheme();
}

function drawScheme() {
    // First, calculate all dimensions dynamically
    const canvasWidth = 1000;
    const topPadding = 50;
    const bottomPadding = 50;
    
    // Calculate heights based on actual content
    const smallLineTop = 30;
    const startingConditionsHeight = 100;
    const gapAfterText = 10;
    const firstArrowLength = Math.round(startingConditionsHeight / 3);
    
    // Calculate box height (we'll get actual height from drawProcessBox)
    const boxEstimatedHeight = 80; // Will be refined
    
    const smallLineBottom = 30;
    const wineConditionsHeight = 88;
    const secondArrowLength = Math.round(wineConditionsHeight / 3);
    
    // Calculate total height
    const totalHeight = topPadding + 
                       smallLineTop + startingConditionsHeight + gapAfterText + firstArrowLength +
                       boxEstimatedHeight +
                       smallLineBottom + wineConditionsHeight + gapAfterText + secondArrowLength +
                       bottomPadding;
    
    // Set canvas dimensions dynamically
    canvas.width = canvasWidth;
    canvas.height = totalHeight;
    
    console.log(`Canvas dynamically sized: ${canvasWidth}x${totalHeight}px`);
    
    // Clear canvas with white background
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Set default styles - black text and lines
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#000';
    ctx.lineWidth = 2;
    
    // Set consistent font for everything
    const fontSize = 16;
    ctx.font = `${fontSize}px Arial`;
    
    let currentY = topPadding;
    
    // Draw starting conditions (4 lines of text)
    drawStartConditions(currentY);
    currentY += startingConditionsHeight;
    currentY += gapAfterText;
    
    console.log(`Starting conditions text: ${startingConditionsHeight}px, First arrow: ${firstArrowLength}px, Gap after text: ${gapAfterText}px`);
    
    // Draw arrow down - proportional to text above
    drawArrow(500, currentY, 500, currentY + firstArrowLength);
    currentY += firstArrowLength;
    
    // Draw acceptance box (Прийомка та сортування)
    const boxInfo = drawProcessBox(200, currentY, 600, 60, 'Прийомка та сортування винограду');
    currentY = boxInfo.bottomY;
    
    // Add small vertical line before text (same as top)
    currentY += smallLineBottom;
    
    // Draw wine conditions text (4 lines)
    drawWineConditions(currentY);
    currentY += wineConditionsHeight;
    currentY += gapAfterText;
    
    console.log(`Wine conditions text: ${wineConditionsHeight}px, Gap after text: ${gapAfterText}px, Second arrow: ${secondArrowLength}px (1/3 of text)`);
    
    // Draw simple arrow (exactly like the top arrow)
    drawArrow(500, currentY, 500, currentY + secondArrowLength);
    currentY += secondArrowLength;
    
    console.log(`Final Y position: ${currentY}px, Canvas height: ${canvas.height}px`);
}

function drawStartConditions(y) {
    // Get raw material conditions from session
    const rawMaterial = wineData.raw_material || {};
    const color = wineData.color || 'вишні';
    const sugar = rawMaterial.sugar || 12;
    const acidity = rawMaterial.acidity || 6;
    const ph = rawMaterial.ph || 3.3;
    
    // Draw vertical line at top
    ctx.beginPath();
    ctx.moveTo(500, y - 30);
    ctx.lineTo(500, y);
    ctx.stroke();
    
    ctx.textAlign = 'center';
    ctx.font = '16px Arial';
    ctx.fillStyle = '#000';
    
    ctx.fillText(`Свіжі ягоди ${getColorText(color)}`, 500, y + 25);
    ctx.fillText(`CP ≥ ${sugar}%`, 500, y + 50);
    ctx.fillText(`C_TK=${acidity}г/дм³`, 500, y + 75);
    ctx.fillText(`pH=${ph}`, 500, y + 100);
}

function getColorText(color) {
    const colorMap = {
        'Біле': 'білого винограду',
        'Червоне': 'червоного винограду',
        'Рожеве': 'рожевого винограду'
    };
    return colorMap[color] || 'вишні';
}

function drawWineConditions(y) {
    // Draw vertical line at top (from box to text start) - same as starting conditions
    ctx.beginPath();
    ctx.moveTo(500, y - 30);
    ctx.lineTo(500, y);
    ctx.stroke();
    
    // Get wine conditions from session
    const wineConditions = wineData.wine_conditions || {};
    const sugar = wineConditions.sugar || 0;
    const acidity = wineConditions.acidity || 0;
    const ph = wineConditions.ph || 0;
    const alcohol = wineConditions.alcohol || 0;
    
    ctx.textAlign = 'center';
    ctx.font = '16px Arial';
    ctx.fillStyle = '#000';
    
    ctx.fillText(`МЧ цукру: ${sugar} г/дм³`, 500, y + 22);
    ctx.fillText(`МЧ кислоти: ${acidity} г/дм³`, 500, y + 44);
    ctx.fillText(`pH: ${ph}`, 500, y + 66);
    ctx.fillText(`Спиртуозність: ${alcohol}%`, 500, y + 88);
}

function drawProcessBox(x, y, width, height, text) {
    // Measure text first to determine actual box size
    ctx.font = '16px Arial';
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    
    const words = text.split(' ');
    let lines = [];
    let currentLine = words[0];
    
    for (let i = 1; i < words.length; i++) {
        const testLine = currentLine + ' ' + words[i];
        const metrics = ctx.measureText(testLine);
        if (metrics.width > width - 80) {
            lines.push(currentLine);
            currentLine = words[i];
        } else {
            currentLine = testLine;
        }
    }
    lines.push(currentLine);
    
    // Calculate actual box dimensions based on text
    const lineHeight = 22;
    const textPaddingH = 30; // Horizontal padding
    const textPaddingV = 20; // Vertical padding
    
    const maxTextWidth = Math.max(...lines.map(line => ctx.measureText(line).width));
    const actualWidth = maxTextWidth + textPaddingH * 2;
    const actualHeight = lines.length * lineHeight + textPaddingV * 2;
    
    // Center the box horizontally, start at y
    const actualX = x + (width - actualWidth) / 2;
    const actualY = y;
    
    // Draw rounded rectangle that fits text
    const radius = 15;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(actualX + radius, actualY);
    ctx.lineTo(actualX + actualWidth - radius, actualY);
    ctx.quadraticCurveTo(actualX + actualWidth, actualY, actualX + actualWidth, actualY + radius);
    ctx.lineTo(actualX + actualWidth, actualY + actualHeight - radius);
    ctx.quadraticCurveTo(actualX + actualWidth, actualY + actualHeight, actualX + actualWidth - radius, actualY + actualHeight);
    ctx.lineTo(actualX + radius, actualY + actualHeight);
    ctx.quadraticCurveTo(actualX, actualY + actualHeight, actualX, actualY + actualHeight - radius);
    ctx.lineTo(actualX, actualY + radius);
    ctx.quadraticCurveTo(actualX, actualY, actualX + radius, actualY);
    ctx.closePath();
    ctx.stroke();
    
    // Draw text
    const startY = actualY + actualHeight / 2 - (lines.length - 1) * lineHeight / 2 + 5;
    
    lines.forEach((line, index) => {
        ctx.fillText(line, actualX + actualWidth / 2, startY + index * lineHeight);
    });
    
    // Return box info for positioning next elements
    return {
        bottomY: actualY + actualHeight,
        height: actualHeight
    };
}

function drawArrow(x1, y1, x2, y2) {
    // Draw line
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Draw arrowhead
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLength = 10;
    
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle - Math.PI / 6),
        y2 - headLength * Math.sin(angle - Math.PI / 6)
    );
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle + Math.PI / 6),
        y2 - headLength * Math.sin(angle + Math.PI / 6)
    );
    ctx.stroke();
}

function drawArrowWithConditions(x1, y1, x2, y2, arrowBefore, arrowAfter, padding, textLines) {
    // Text lines are now passed in to ensure consistency
    
    // Calculate text box dimensions
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    const lineHeight = 22;
    const textHeight = textLines.length * lineHeight;
    const maxWidth = Math.max(...textLines.map(line => ctx.measureText(line).width));
    
    // Position text centered on the arrow
    const textX = x2;
    
    // Arrow structure: arrowBefore + padding + text + padding + arrowAfter
    const textTop = y1 + arrowBefore + padding;
    const textBottom = textTop + textHeight;
    
    // Draw arrow in two parts (interrupted by text + padding)
    const gapTop = y1 + arrowBefore;  // Arrow stops here
    const gapBottom = textBottom + padding;  // Arrow resumes here
    
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    
    // Top part of arrow
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x1, gapTop);
    ctx.stroke();
    
    // Bottom part of arrow with arrowhead
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLength = 10;
    
    ctx.beginPath();
    ctx.moveTo(x2, gapBottom);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Draw arrowhead
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle - Math.PI / 6),
        y2 - headLength * Math.sin(angle - Math.PI / 6)
    );
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle + Math.PI / 6),
        y2 - headLength * Math.sin(angle + Math.PI / 6)
    );
    ctx.stroke();
    
    // Draw white background rectangle for text (centered on arrow)
    ctx.fillStyle = '#fff';
    ctx.fillRect(
        textX - maxWidth / 2 - padding, 
        textTop, 
        maxWidth + padding * 2, 
        textHeight
    );
    
    // Draw text lines centered vertically on arrow
    ctx.fillStyle = '#000';
    textLines.forEach((line, index) => {
        ctx.fillText(line, textX, textTop + (index + 0.8) * lineHeight);
    });
}

// Function to download the scheme as PNG
function downloadSchemePNG() {
    const link = document.createElement('a');
    link.download = 'principova-tehnologichna-scheme.png';
    link.href = canvas.toDataURL();
    link.click();
}

// Function to download the scheme as PDF
function downloadSchemePDF() {
    const { jsPDF } = window.jspdf;
    
    // Get canvas dimensions
    const canvasWidth = canvas.width;
    const canvasHeight = canvas.height;
    
    // Create PDF with appropriate orientation and size
    // Convert pixels to mm (assuming 96 DPI: 1 inch = 25.4mm, 96px = 25.4mm)
    const pdfWidth = (canvasWidth * 25.4) / 96;
    const pdfHeight = (canvasHeight * 25.4) / 96;
    
    // Determine orientation
    const orientation = pdfWidth > pdfHeight ? 'landscape' : 'portrait';
    
    // Create PDF with custom dimensions
    const pdf = new jsPDF({
        orientation: orientation,
        unit: 'mm',
        format: [pdfWidth, pdfHeight]
    });
    
    // Add canvas as image to PDF
    const imgData = canvas.toDataURL('image/png');
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    
    // Save the PDF
    pdf.save('principova-tehnologichna-scheme.pdf');
}

// Load data and draw on page load
loadWineData();

// Add version for debugging
console.log('Technology Scheme Version: 5.4 - PNG and PDF download options with jsPDF');
</script>
{% endblock %}
