{% extends "base.html" %}

{% block title %}Принципова технологічна схема - Vynorob{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
        max-width: 1200px;
    }
    
    .scheme-canvas-container {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        min-height: auto;
    }
    
    #schemeCanvas {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid #ddd;
    }
    
    .scheme-title {
        color: #000;
        text-align: center;
        font-size: 2rem;
        margin-bottom: 30px;
        font-family: Arial, sans-serif;
    }
    
    .controls {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 30px;
        flex-wrap: wrap;
    }
    
    .btn {
        padding: 15px 30px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .btn-secondary {
        background: #6c757d;
        color: white;
        box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
    }
    
    .btn-secondary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(108, 117, 125, 0.6);
        background: #5a6268;
    }
</style>
{% endblock %}

{% block content %}
<div class="scheme-canvas-container">
    <h1 class="scheme-title">Принципова технологічна схема</h1>
    <canvas id="schemeCanvas"></canvas>
    
    <div class="controls">
        <button class="btn btn-secondary" onclick="window.location.href='/'">На головну</button>
        <button class="btn btn-primary" onclick="downloadSchemePNG()">
            📥 Завантажити PNG
        </button>
        <button class="btn btn-primary" onclick="downloadSchemePDF()">
            📄 Завантажити PDF
        </button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const canvas = document.getElementById('schemeCanvas');
const ctx = canvas.getContext('2d');

// Get session data
let wineData = {};

async function loadWineData() {
    const response = await fetch('/api/get-session');
    wineData = await response.json();
    drawScheme();
}

function drawScheme() {
    // First, calculate all dimensions dynamically
    const canvasWidth = 1000;
    const topPadding = 50;
    const bottomPadding = 50;
    const arrowLength = 40;
    
    // Estimate total height (will adjust as we draw)
    const totalHeight = 2000; // Generous initial height
    
    // Set canvas dimensions dynamically
    canvas.width = canvasWidth;
    canvas.height = totalHeight;
    
    console.log(`Canvas dynamically sized: ${canvasWidth}x${totalHeight}px`);
    
    // Clear canvas with white background
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Set default styles - black text and lines
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#000';
    ctx.lineWidth = 2;
    ctx.font = '14px Arial';
    
    let currentY = topPadding;
    const centerX = canvasWidth / 2; // Center horizontally
    const boxWidth = 260;
    
    // Draw starting conditions
    currentY = drawStartingConditions(centerX, currentY);
    
    // First arrow with text intersection
    const textHeight = 60;
    currentY = drawArrowWithText(centerX, currentY, textHeight, 'М\'язга');
    
    // 1. Гребеневіддокремлення, Подрібнення
    const box1Y = currentY;
    currentY = drawProcessWithSideOutput(centerX, currentY, boxWidth, 0, 
        'Гребеневіддокремлення,\nПодрібнення', 'Гребені', true);
    
    // Regular arrow to next
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 2. Віддилення сусла-самопливу
    currentY = drawProcessWithSideOutput(centerX, currentY, boxWidth, 0,
        'Віддилення\nсусла-самопливу', 'Збіднена\nм\'язга', true);
    
    drawSideLabel(centerX, currentY + 25, "Сусло-самоплив", false);
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 3. Пресування with side inputs
    const box3Y = currentY;
    currentY = drawProcessWithSideOutput(centerX, currentY, boxWidth, 0,
        'Пресування', 'Вичавки\n→Пресові II та\nIII фракції на\nординарні\nміцні вина', true);
    const box3Height = currentY - box3Y;
    drawSideInput(centerX - 200, box3Y + box3Height/2, 'Холодоагент ←\nМатеріали для\nосвітлення →\nSO₂\n75...80 мг/дм³→');
    
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 4. Відстоювання сусла
    currentY = drawProcessBox(centerX, currentY, boxWidth, 0,
        'Відстоювання сусла:\nt = 14...17°C,\nτ = 12 год');
    
    drawSideLabel(centerX, currentY + 25, "І фракція", false);
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 5. Зняття з осаду
    currentY = drawProcessBox(centerX, currentY, boxWidth, 0,
        'Зняття з осаду');
    
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 6. Бродіння сусла
    const box6Y = currentY;
    currentY = drawProcessWithSideOutput(centerX, currentY, boxWidth, 0,
        'Бродіння сусла,\nt=14...17°C', 'Гази бродіння', true);
    const box6Height = currentY - box6Y;
    drawSideInput(centerX - 200, box6Y + box6Height/2, 'ЧКД →\nХолодоагент ←');
    
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 7. Освітлення виноматервалу
    const box7Y = currentY;
    currentY = drawProcessWithSideOutput(centerX, currentY, boxWidth, 0,
        'Освітлення\nвиноматервалу\nt=10...12°C', 'Осад', true);
    const box7Height = currentY - box7Y;
    drawSideInput(centerX - 200, box7Y + box7Height/2, 'Холодоагент ←');
    
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 8. Зняття з дріжджів
    currentY = drawProcessWithSideOutput(centerX, currentY, boxWidth, 0,
        'Зняття з дріжджів', 'Дріжджові осади', true);
    
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 9. Егалізація
    const box9Y = currentY;
    currentY = drawProcessBox(centerX, currentY, boxWidth, 0,
        'Егалізація');
    const box9Height = currentY - box9Y;
    drawSideInput(centerX - 200, box9Y + box9Height/2, 'SO₂ →\n30...50 мг/дм³');
    
    drawArrow(centerX, currentY, centerX, currentY + arrowLength);
    currentY += arrowLength;
    
    // 10. Зберігання
    currentY = drawProcessBox(centerX, currentY, boxWidth, 0,
        'Зберігання');
    
    // Last arrow with text intersection
    currentY = drawArrowWithText(centerX, currentY, 80, null, true);
    
    // Final product
    drawFinalProduct(centerX, currentY);
    
    console.log(`Final Y position: ${currentY}px, Canvas height: ${canvas.height}px`);
}

function drawStartingConditions(x, y) {
    // Get raw material conditions from session
    const rawMaterial = wineData.raw_material || {};
    const color = wineData.color || 'Біле';
    const sugar = rawMaterial.sugar || 170;
    const acidity = rawMaterial.acidity || 6;
    
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#000';
    
    ctx.fillText('Виноград:', x, y);
    ctx.fillText(`Cц ≥ ${sugar} г/дм³,`, x, y + 20);
    ctx.fillText(`Ст.к = ${acidity}...9 г/дм³`, x, y + 40);
    
    ctx.restore();
    return y + 60;
}

function drawProcessWithSideOutput(x, y, width, height, mainText, sideText, isRightSide) {
    // Draw main process box and get the bottom Y position
    const boxBottomY = drawProcessBox(x, y, width, height, mainText);
    
    // Calculate the actual height of the box
    const actualHeight = boxBottomY - y;
    
    // Draw side arrow and text centered vertically on the box
    const midY = y + actualHeight / 2;
    
    if (isRightSide) {
        // Arrow to the right
        const startX = x + width / 2;
        const endX = startX + 120;
        
        drawArrow(startX, midY, endX, midY);
        
        // Draw side text
        ctx.save();
        ctx.textAlign = 'left';
        ctx.font = '12px Arial';
        const lines = sideText.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, endX + 10, midY + (i - lines.length/2 + 0.5) * 14);
        });
        ctx.restore();
    }
    
    return boxBottomY;
}

function drawSideInput(x, y, text) {
    ctx.save();
    ctx.textAlign = 'right';
    ctx.font = '11px Arial';
    const lines = text.split('\n');
    lines.forEach((line, i) => {
        ctx.fillText(line, x, y + (i - lines.length/2 + 0.5) * 14);
    });
    ctx.restore();
}

function drawSideLabel(x, y, text, isDown) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = '12px Arial';
    ctx.fillStyle = '#000';
    // No additional offset needed - y is already positioned correctly
    ctx.fillText(text, x, y);
    ctx.restore();
}

function drawFinalProduct(x, y) {
    // Final product text is now drawn in drawArrowWithText
    // This function is kept for compatibility
}

function drawProcessBox(x, y, width, height, text) {
    ctx.save();
    
    // Handle multi-line text with \n
    let lines = text.split('\n');
    
    // Calculate box dimensions dynamically based on text
    const fontSize = 14;
    const lineHeight = 20; // Increased from 18 to give more space
    const paddingV = 18; // Increased vertical padding
    const paddingH = 25; // Increased horizontal padding
    ctx.font = `${fontSize}px Arial`;
    
    const maxTextWidth = Math.max(...lines.map(line => ctx.measureText(line).width));
    const actualWidth = Math.max(width, maxTextWidth + (paddingH * 2));
    
    // Height based on text content with proper spacing
    const textBlockHeight = (lines.length - 1) * lineHeight + fontSize;
    const actualHeight = textBlockHeight + (paddingV * 2);
    
    // Center the box
    const boxX = x - actualWidth / 2;
    const boxY = y;
    
    // Draw rounded rectangle
    const radius = 8;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#fff'; // White background
    
    ctx.beginPath();
    ctx.moveTo(boxX + radius, boxY);
    ctx.lineTo(boxX + actualWidth - radius, boxY);
    ctx.quadraticCurveTo(boxX + actualWidth, boxY, boxX + actualWidth, boxY + radius);
    ctx.lineTo(boxX + actualWidth, boxY + actualHeight - radius);
    ctx.quadraticCurveTo(boxX + actualWidth, boxY + actualHeight, boxX + actualWidth - radius, boxY + actualHeight);
    ctx.lineTo(boxX + radius, boxY + actualHeight);
    ctx.quadraticCurveTo(boxX, boxY + actualHeight, boxX, boxY + actualHeight - radius);
    ctx.lineTo(boxX, boxY + radius);
    ctx.quadraticCurveTo(boxX, boxY, boxX + radius, boxY);
    ctx.closePath();
    
    ctx.fill();
    ctx.stroke();
    
    // Draw text centered vertically with proper baseline
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top'; // Use top baseline for consistent positioning
    
    // Start from top padding and draw each line
    const textStartY = boxY + paddingV;
    lines.forEach((line, i) => {
        ctx.fillText(line, x, textStartY + (i * lineHeight));
    });
    
    ctx.restore();
    return boxY + actualHeight;
}

function drawArrow(x1, y1, x2, y2) {
    ctx.save();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    
    // Draw line
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Draw arrowhead (filled triangle)
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLength = 8;
    
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle - Math.PI / 7),
        y2 - headLength * Math.sin(angle - Math.PI / 7)
    );
    ctx.lineTo(
        x2 - headLength * Math.cos(angle + Math.PI / 7),
        y2 - headLength * Math.sin(angle + Math.PI / 7)
    );
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
}

function drawArrowWithText(x, startY, totalHeight, label, isFinal = false) {
    ctx.save();
    
    // For first arrow: text in middle, or for final: wine conditions
    const arrowPart = totalHeight / 3;
    const textPadding = 10;
    
    // Draw first part of arrow
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, startY);
    ctx.lineTo(x, startY + arrowPart);
    ctx.stroke();
    
    // Draw text in white background
    ctx.textAlign = 'center';
    ctx.font = '12px Arial';
    ctx.fillStyle = '#000';
    
    if (isFinal) {
        // Draw final wine conditions
        const wineConditions = wineData.wine_conditions || {};
        const sugar = wineConditions.sugar || 2;
        const acidity = wineConditions.acidity || 6;
        const alcohol = wineConditions.alcohol || 11;
        
        const lines = [
            'Виноматервіал на',
            'оброблення та розлив:',
            `Cц≤${sugar} г/дм³`,
            `Cсп = ${Math.round(alcohol)}...14 % об.`
        ];
        
        const lineHeight = 16;
        const textY = startY + arrowPart + textPadding;
        
        lines.forEach((line, i) => {
            ctx.fillText(line, x, textY + (i * lineHeight));
        });
        
        ctx.restore();
        return startY + totalHeight;
    } else if (label) {
        // Simple label
        const textY = startY + arrowPart + textPadding + 10;
        ctx.fillText(label, x, textY);
    }
    
    // Draw second part of arrow with arrowhead
    const arrowStartY = startY + arrowPart + textPadding * 2 + (label ? 20 : 0);
    const arrowEndY = startY + totalHeight;
    
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, arrowStartY);
    ctx.lineTo(x, arrowEndY);
    ctx.stroke();
    
    // Draw arrowhead
    const headLength = 8;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(x, arrowEndY);
    ctx.lineTo(x - headLength / 2, arrowEndY - headLength);
    ctx.lineTo(x + headLength / 2, arrowEndY - headLength);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
    return arrowEndY;
}

function drawArrowWithConditions(x1, y1, x2, y2, arrowBefore, arrowAfter, padding, textLines) {
    // Text lines are now passed in to ensure consistency
    
    // Calculate text box dimensions
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    const lineHeight = 22;
    const textHeight = textLines.length * lineHeight;
    const maxWidth = Math.max(...textLines.map(line => ctx.measureText(line).width));
    
    // Position text centered on the arrow
    const textX = x2;
    
    // Arrow structure: arrowBefore + padding + text + padding + arrowAfter
    const textTop = y1 + arrowBefore + padding;
    const textBottom = textTop + textHeight;
    
    // Draw arrow in two parts (interrupted by text + padding)
    const gapTop = y1 + arrowBefore;  // Arrow stops here
    const gapBottom = textBottom + padding;  // Arrow resumes here
    
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    
    // Top part of arrow
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x1, gapTop);
    ctx.stroke();
    
    // Bottom part of arrow with arrowhead
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLength = 10;
    
    ctx.beginPath();
    ctx.moveTo(x2, gapBottom);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Draw arrowhead
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle - Math.PI / 6),
        y2 - headLength * Math.sin(angle - Math.PI / 6)
    );
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle + Math.PI / 6),
        y2 - headLength * Math.sin(angle + Math.PI / 6)
    );
    ctx.stroke();
    
    // Draw white background rectangle for text (centered on arrow)
    ctx.fillStyle = '#fff';
    ctx.fillRect(
        textX - maxWidth / 2 - padding, 
        textTop, 
        maxWidth + padding * 2, 
        textHeight
    );
    
    // Draw text lines centered vertically on arrow
    ctx.fillStyle = '#000';
    textLines.forEach((line, index) => {
        ctx.fillText(line, textX, textTop + (index + 0.8) * lineHeight);
    });
}

// Function to download the scheme as PNG
function downloadSchemePNG() {
    const link = document.createElement('a');
    link.download = 'principova-tehnologichna-scheme.png';
    link.href = canvas.toDataURL();
    link.click();
}

// Function to download the scheme as PDF
function downloadSchemePDF() {
    const { jsPDF } = window.jspdf;
    
    // Get canvas dimensions
    const canvasWidth = canvas.width;
    const canvasHeight = canvas.height;
    
    // Create PDF with appropriate orientation and size
    // Convert pixels to mm (assuming 96 DPI: 1 inch = 25.4mm, 96px = 25.4mm)
    const pdfWidth = (canvasWidth * 25.4) / 96;
    const pdfHeight = (canvasHeight * 25.4) / 96;
    
    // Determine orientation
    const orientation = pdfWidth > pdfHeight ? 'landscape' : 'portrait';
    
    // Create PDF with custom dimensions
    const pdf = new jsPDF({
        orientation: orientation,
        unit: 'mm',
        format: [pdfWidth, pdfHeight]
    });
    
    // Add canvas as image to PDF
    const imgData = canvas.toDataURL('image/png');
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    
    // Save the PDF
    pdf.save('principova-tehnologichna-scheme.pdf');
}

// Load data and draw on page load
loadWineData();

// Add version for debugging
console.log('Technology Scheme Version: 5.4 - PNG and PDF download options with jsPDF');
</script>
{% endblock %}
