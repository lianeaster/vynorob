{% extends "base.html" %}

{% block title %}Принципова технологічна схема - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .container {
        max-width: 1200px;
    }
    
    .scheme-canvas-container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 
            0 20px 60px rgba(0, 0, 0, 0.4),
            0 0 0 1px rgba(212, 175, 110, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.8);
        min-height: auto;
        backdrop-filter: blur(10px);
    }
    
    #schemeCanvas {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid #d9cab8;
    }
    
    .scheme-title {
        color: #3b1022;
        text-align: center;
        font-size: 2rem;
        margin-bottom: 30px;
        font-family: 'Georgia', 'Times New Roman', serif;
    }
    
    .controls {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 30px;
        flex-wrap: wrap;
    }
    
    .btn {
        padding: 15px 30px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #722f3e 0%, #4a1228 50%, #8b3a52 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(114, 47, 62, 0.5);
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(114, 47, 62, 0.6);
        background: linear-gradient(135deg, #8b3a52 0%, #5a1a32 50%, #9e4565 100%);
    }
    
    .btn-secondary {
        background: #e8ddd0;
        color: #4a1228;
        box-shadow: 0 4px 15px rgba(74, 18, 40, 0.2);
    }
    
    .btn-secondary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(74, 18, 40, 0.3);
        background: #d9cab8;
    }
</style>
{% endblock %}

{% block content %}
<div class="scheme-canvas-container">
    <div style="text-align: center; margin-bottom: 15px;">
        <span style="font-size: 12px; color: #999; font-weight: 500;">Крок 7 з 7</span>
    </div>
    <h1 class="scheme-title">Принципова технологічна схема</h1>
    <canvas id="schemeCanvas"></canvas>
    
    <div style="display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; align-items: center;">
        <button class="btn btn-secondary" onclick="window.location.href='/summary'" style="background: #e0e0e0; color: #666;">
            ← Назад
        </button>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; flex: 1;">
            <button class="btn btn-secondary" onclick="window.location.href='/'">На головну</button>
            <button class="btn btn-primary" onclick="downloadSchemePNG()">
                📥 Завантажити PNG
            </button>
            <button class="btn btn-primary" onclick="downloadSchemePDF()">
                📄 Завантажити PDF
            </button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Force reload with timestamp
const timestamp = new Date().getTime();
const script = document.createElement('script');
script.src = "{{ url_for('static', filename='js/scheme_renderer.js') }}?t=" + timestamp;
document.head.appendChild(script);

const canvas = document.getElementById('schemeCanvas');
let renderer = null;

script.onload = function() {
    loadWineData();
};

async function loadWineData() {
    try {
        const response = await fetch('/api/technology-steps');

        if (!response.ok) {
            const error = await response.json();
            if (error.session_expired) {
                window.location.href = error.redirect || '/auth/login';
                return;
            }
            alert('Помилка: ' + (error.error || 'Не вдалося побудувати технологічні кроки'));
            return;
        }

        const data = await response.json();
        const { steps, wine_data } = data;

        renderer = new SchemeRenderer(canvas, wine_data);
        renderer.drawTechnologySteps(steps);
    } catch (error) {
        console.error('Error loading technology steps:', error);
        alert('Помилка завантаження схеми: ' + error.message);
    }
}

// Functions for download buttons
function downloadSchemePNG() {
    if (renderer) {
        renderer.downloadPNG();
    }
}

function downloadSchemePDF() {
    if (renderer) {
        renderer.downloadPDF();
    }
}

// Add version for debugging  
const version = '26.0-all-white-backgrounds-final-' + Date.now();
console.log('Technology Scheme Version:', version);
</script>
{% endblock %}
