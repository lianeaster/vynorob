{% extends "base.html" %}

{% block title %}Стиль вина - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .btn-choice:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #f0f0f0;
        color: #999;
        border-color: #ddd;
    }
    .btn-choice:disabled:hover {
        transform: none;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Стиль</h1>
        <p class="subtitle">Виберіть стиль вина</p>
        
        <div class="button-group">
            <button class="btn btn-choice" onclick="selectChoice('style', 'Сухе')">Сухе</button>
            <button class="btn btn-choice" onclick="selectChoice('style', 'Напівсухе')" disabled>Напівсухе</button>
            <button class="btn btn-choice" onclick="selectChoice('style', 'Напівсолодке')" disabled>Напівсолодке</button>
            <button class="btn btn-choice" onclick="selectChoice('style', 'Солодке')" disabled>Солодке</button>
        </div>
    </div>
</div>

<script>
async function selectChoice(step, choice) {
    await saveChoice(step, choice);
    window.location.href = '/style-co2';
}
</script>
{% endblock %}
