{% extends "base.html" %}

{% block title %}Стиль вина - Vynorob{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Стиль</h1>
        <p class="subtitle">Виберіть стиль вина</p>
        
        <div class="button-group">
            <button class="btn btn-choice" onclick="selectChoice('style', 'Сухе')">Сухе</button>
            <button class="btn btn-choice" onclick="selectChoice('style', 'Напівсухе')">Напівсухе</button>
            <button class="btn btn-choice" onclick="selectChoice('style', 'Напівсолодке')">Напівсолодке</button>
            <button class="btn btn-choice" onclick="selectChoice('style', 'Солодке')">Солодке</button>
        </div>
    </div>
</div>

<script>
async function selectChoice(step, choice) {
    await saveChoice(step, choice);
    window.location.href = '/style-co2';
}
</script>
{% endblock %}
