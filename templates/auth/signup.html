{% extends "base.html" %}

{% block title %}Реєстрація - Vynorob{% endblock %}

{% block content %}
<style>
{% include 'auth/_password_validation.css' %}
</style>

<div class="step-page">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Vynorob" style="max-width: 220px; height: auto;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display: none;">
                <span style="font-size: 48px; display: block; margin-bottom: 8px;">🍷</span>
                <span style="font-size: 28px; font-weight: bold; font-family: 'Georgia', 'Times New Roman', serif; letter-spacing: 3px; background: linear-gradient(135deg, #722f3e 0%, #4a1228 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Vynorob</span>
            </div>
        </div>
        <h1 class="title" style="font-size: 1.8rem;">Реєстрація</h1>
        <p class="subtitle">Створіть новий обліковий запис</p>
        
        {% if error %}
        <div style="padding: 15px; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 10px; margin: 20px 0; color: #721c24;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" style="margin-top: 30px;">
            <div style="margin-bottom: 20px;">
                <label for="email" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                    Email <span style="color: #d32f2f;">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="example@email.com"
                    value="{{ request.form.get('email', '') }}"
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: border-color 0.3s;"
                >
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="name" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                    Ім'я <span style="color: #d32f2f;">*</span>
                </label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    required
                    placeholder="Ваше ім'я"
                    value="{{ request.form.get('name', '') }}"
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: border-color 0.3s;"
                >
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="password" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                    Пароль <span style="color: #d32f2f;">*</span>
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    placeholder="Введіть пароль"
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: border-color 0.3s;"
                >
                {% include 'auth/_password_requirements.html' %}
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="confirm_password" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                    Підтвердіть пароль <span style="color: #d32f2f;">*</span>
                </label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    required
                    placeholder="Повторіть пароль"
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: border-color 0.3s;"
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                Зареєструватись
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd;">
            <p style="color: #666; margin-bottom: 10px;">Вже маєте обліковий запис?</p>
            <a href="{{ url_for('auth.login') }}" style="color: #8b3a52; font-weight: 500; text-decoration: none;">
                Увійти
            </a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const emailInput = document.getElementById('email');
    const nameInput = document.getElementById('name');
    
    // Email validation
    emailInput.addEventListener('input', function() {
        const email = this.value.trim();
        if (email && email.includes('@')) {
            this.style.borderColor = '#4caf50'; // Green
        } else if (email) {
            this.style.borderColor = '#f44336'; // Red
        } else {
            this.style.borderColor = '#ddd'; // Default
        }
    });
    
    // Name validation
    nameInput.addEventListener('input', function() {
        const name = this.value.trim();
        if (name.length > 0) {
            this.style.borderColor = '#4caf50'; // Green
        } else {
            this.style.borderColor = '#ddd'; // Default
        }
    });
    
    // Password validation (shared)
    {% include 'auth/_password_validation.js' %}
});
</script>
{% endblock %}
