{% extends "base.html" %}

{% block title %}Схема - Vynorob{% endblock %}

{% block extra_css %}
<style>
    .btn-choice:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #f0f0f0;
        color: #999;
        border-color: #ddd;
    }
    .btn-choice:disabled:hover {
        transform: none;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="step-page">
    <div class="card">
        <h1 class="title">Схема</h1>
        <p class="subtitle">Виберіть тип схеми виробництва</p>
        
        <div class="button-group">
            <button class="btn btn-choice" id="choice-Біла" onclick="selectSchemeType('Біла')">Біла</button>
            <button class="btn btn-choice" id="choice-Червона" onclick="selectSchemeType('Червона')">Червона</button>
            <button class="btn btn-choice" id="choice-Змішана" onclick="selectSchemeType('Змішана')" disabled>Змішана</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 40px; gap: 15px;">
            <button class="btn" onclick="window.location.href='/choice'" style="background: #e0e0e0; color: #666;">
                ← Назад
            </button>
            <button class="btn btn-primary" id="nextBtn" onclick="goNext()" disabled style="opacity: 0.5;">
                Далі →
            </button>
        </div>
    </div>
</div>

<script>
let selectedScheme = null;

async function selectSchemeType(scheme) {
    selectedScheme = scheme;
    
    // Update button states
    document.querySelectorAll('.btn-choice').forEach(btn => {
        if (!btn.disabled) {
            btn.style.opacity = '0.6';
            btn.style.transform = 'scale(1)';
        }
    });
    
    const selectedBtn = document.getElementById('choice-' + scheme);
    if (selectedBtn) {
        selectedBtn.style.opacity = '1';
        selectedBtn.style.transform = 'scale(1.05)';
        selectedBtn.style.boxShadow = '0 8px 16px rgba(114, 47, 62, 0.3)';
    }
    
    // Enable next button
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').style.opacity = '1';
}

async function goNext() {
    if (!selectedScheme) {
        alert('Будь ласка, оберіть тип схеми');
        return;
    }
    
    await saveChoice('scheme_type', selectedScheme);
    window.location.href = '/summary';
}

// Load previous choice if exists
window.addEventListener('DOMContentLoaded', async function() {
    const sessionData = await getSessionData();
    if (sessionData.scheme_type) {
        selectSchemeType(sessionData.scheme_type);
    }
});
</script>
{% endblock %}
